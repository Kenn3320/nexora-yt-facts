name: 🧪 Test YouTube Ranking Generator

on:
  workflow_dispatch:

jobs:
  test-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate ranking script + voiceover
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python generate_facts.py

      - name: Render final video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python render_video.py

      - name: Upload result as artifact (buat di-cek)
        uses: actions/upload-artifact@v4
        with:
          name: yt-ranking-test
          path: yt_output/
          retention-days: 3
